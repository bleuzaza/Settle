# Archive Release + IPA — même pipeline que Panium (Swift natif + XcodeGen).
# Upload TestFlight séparé : settle-upload-testflight.yml (réutilise l'artifact IPA).

name: Settle TestFlight

on:
  workflow_dispatch:
    inputs:
      upload_testflight:
        description: "Uploader vers TestFlight après export (déconseillé — préférer settle-upload-testflight)"
        type: boolean
        default: false
      build_number:
        description: "CFBundleVersion (vide = numéro de run GitHub)"
        type: string
        required: false
        default: ""

env:
  XCODE_SCHEME: Settle
  IOS_DEPLOYMENT_TARGET: "17.0"
  XCODE_VERSION: "26.2"
  DEVELOPMENT_TEAM: "4N92TKQ397"
  BUNDLE_ID_APP: com.cashthetrain.settle

concurrency:
  group: settle-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  archive-and-upload:
    name: Archive + IPA
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer scripts CI (LF, compatible Windows)
        run: |
          for f in ci/*.sh; do tr -d '\r' < "$f" > "$f.tmp" && mv "$f.tmp" "$f"; done

      - name: Vérifier alignement pipeline TestFlight
        run: bash ci/verify-testflight-pipeline.sh

      - name: Sélectionner Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Vérifier la structure
        run: |
          test -f project.yml
          test -f ci/install_signing.py
          test -d Settle
          bash ci/verify-no-critical-entitlements.sh
          xcodebuild -version

      - name: Installer certificat Distribution (réutilisé — pas de nouveau cert)
        env:
          CI_APP_SLUG: settle
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: python3 ci/install_signing.py

      - name: Régénérer profil App Store (API Apple)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          IOS_DISTRIBUTION_CERTIFICATE_ID: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_ID }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_PRIVATE_KEY" ]; then
            echo "::error::Secrets ASC_KEY_ID, ASC_ISSUER_ID, ASC_PRIVATE_KEY requis pour le profil"
            exit 1
          fi
          bash ci/refresh-profiles-api.sh

      - name: Générer les icônes App Store
        run: python3 ci/generate-app-icons.py

      - name: Numéro de build (unique par tentative)
        id: buildno
        run: |
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            BN="${{ github.event.inputs.build_number }}"
          else
            BN=$(( ${{ github.run_number }} * 10 + ${{ github.run_attempt }} ))
          fi
          if [ "$BN" -le 1 ]; then
            echo "::error::CFBundleVersion doit être > 1. Valeur calculée: $BN"
            exit 1
          fi
          echo "value=$BN" >> "$GITHUB_OUTPUT"
          echo "CFBundleVersion (unique)=$BN"

      - name: Appliquer le numéro de build (project.yml)
        run: |
          BN="${{ steps.buildno.outputs.value }}"
          sed -i.bak "s/CURRENT_PROJECT_VERSION: \".*\"/CURRENT_PROJECT_VERSION: \"$BN\"/" project.yml
          grep CURRENT_PROJECT_VERSION project.yml

      - name: Installer XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Générer le projet Xcode
        run: xcodegen generate --spec project.yml

      - name: Configurer la clé API App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          if [ -z "$ASC_KEY_ID" ] || [ -z "$ASC_ISSUER_ID" ] || [ -z "$ASC_PRIVATE_KEY" ]; then
            echo "::error::Secrets ASC_* requis"
            exit 1
          fi

      - name: Préparer le trousseau pour codesign
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          bash ci/keychain-unlock.sh
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Archive (Release, signature manuelle)
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/Settle.xcarchive
        run: |
          set -euo pipefail
          LOG="${RUNNER_TEMP}/xcode-archive.log"
          set +e
          xcodebuild archive \
            -project "Settle.xcodeproj" \
            -scheme "${{ env.XCODE_SCHEME }}" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            -destination "generic/platform=iOS" \
            -sdk iphoneos \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_DEPLOYMENT_TARGET }}" \
            DEVELOPMENT_TEAM="${{ env.DEVELOPMENT_TEAM }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_APP_PROFILE_UUID}" \
            CURRENT_PROJECT_VERSION="${{ steps.buildno.outputs.value }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            2>&1 | tee "$LOG"
          STATUS=${PIPESTATUS[0]}
          set -e
          if [ "$STATUS" -ne 0 ]; then
            echo "::group::Erreurs de compilation Swift"
            grep -E "error:" "$LOG" | tail -60 || true
            echo "::endgroup::"
            exit "$STATUS"
          fi

      - name: Export IPA (App Store)
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/Settle.xcarchive
          EXPORT_PATH: ${{ runner.temp }}/export
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          bash ci/keychain-unlock.sh
          rm -rf "$EXPORT_PATH"
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist ExportOptions-ci.plist
          test -f "$EXPORT_PATH/Settle.ipa" || (echo "Settle.ipa introuvable" && exit 1)

      - name: Vérifier signature Distribution (anti ITMS-90035)
        env:
          EXPORT_PATH: ${{ runner.temp }}/export
        run: bash ci/verify-ipa-signature.sh "$EXPORT_PATH/Settle.ipa"

      - name: Vérifier CFBundleVersion dans l'IPA
        env:
          EXPORT_PATH: ${{ runner.temp }}/export
          EXPECTED_BUILD: ${{ steps.buildno.outputs.value }}
        run: |
          set -euo pipefail
          unzip -q -o "$EXPORT_PATH/Settle.ipa" -d "$EXPORT_PATH/ipa-inspect"
          APP_PLIST=$(find "$EXPORT_PATH/ipa-inspect/Payload" -name Info.plist -path "*.app/Info.plist" | head -1)
          ACTUAL=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_PLIST")
          echo "CFBundleVersion dans l'IPA: $ACTUAL (attendu: $EXPECTED_BUILD)"
          if [ "$ACTUAL" != "$EXPECTED_BUILD" ]; then
            echo "::error::L'IPA contient la build $ACTUAL au lieu de $EXPECTED_BUILD"
            exit 1
          fi

      - name: Upload artifact IPA
        uses: actions/upload-artifact@v4
        with:
          name: Settle-ipa
          path: ${{ runner.temp }}/export/Settle.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload vers TestFlight
        id: testflight_upload
        if: ${{ github.event.inputs.upload_testflight == 'true' }}
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/export/Settle.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}

      - name: Où voir la build (résumé)
        if: always()
        run: |
          echo "## Settle — Build ${{ steps.buildno.outputs.value }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Artifact : **Settle-ipa** (run_id=${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.testflight_upload.outcome }}" = "success" ]; then
            echo "Upload TestFlight : **OK** — la build apparaît dans 5 à 30 min." >> "$GITHUB_STEP_SUMMARY"
            echo "1. [App Store Connect](https://appstoreconnect.apple.com/apps) → app **Settle**" >> "$GITHUB_STEP_SUMMARY"
            echo "2. Onglet **TestFlight** → **Builds**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.testflight_upload.outcome }}" = "skipped" ]; then
            echo "Upload TestFlight : **ignoré** — lance \`settle-upload-testflight\` avec run_id=${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Upload TestFlight : **échec** — relance \`settle-upload-testflight\` avec run_id=${{ github.run_id }} (pas de rebuild)." >> "$GITHUB_STEP_SUMMARY"
          fi
