name: Settle
options:
  bundleIdPrefix: com.cashthetrain
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: "4N92TKQ397"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Release:
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: Apple Distribution

targets:
  Settle:
    type: application
    platform: iOS
    configFiles:
      Release: ci/Release-App.xcconfig
    sources:
      - path: Settle
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cashthetrain.settle
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Settle/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution

  SettleTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - SettleTests
    dependencies:
      - target: Settle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cashthetrain.settle.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Settle.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Settle"

schemes:
  Settle:
    build:
      targets:
        Settle: all
        SettleTests: [test]
    run:
      config: Debug
    test:
      targets:
        - SettleTests
